<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #080d18; font-family: 'Georgia', serif; }

  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(201,169,98,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,169,98,0.04) 1px, transparent 1px);
    background-size: 90px 90px;
    z-index: 1;
  }

  .wrap {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 72px;
  }

  .three-words {
    display: flex; flex-direction: row; align-items: baseline;
    gap: 20px; margin-bottom: 48px;
  }

  .word {
    font-size: 60px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .word.gold { color: #C9A962; }

  .dot-sep {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(201,169,98,0.35);
    margin-bottom: 6px;
  }

  /* 2x3 grid of service cards */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 6px;
    width: 100%;
    flex: 1;
    margin-bottom: 0;
  }

  .service-card {
    position: relative;
    overflow: hidden;
    height: 246px;
  }

  .card-photo {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 0.3s;
  }

  /* Dark overlay */
  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, rgba(4,8,16,0.45) 0%, rgba(4,8,16,0.72) 100%);
  }

  /* Gold bottom-left gradient */
  .card-glow {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(201,169,98,0.18) 0%, transparent 50%);
  }

  .card-border {
    position: absolute; inset: 0;
    border: 1px solid rgba(201,169,98,0.18);
  }

  .card-content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 20px 22px;
    z-index: 2;
  }

  .card-name {
    font-size: 19px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  }

  .card-sub {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    color: rgba(201,169,98,0.75);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }

  .tagline {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(201,169,98,0.45);
    text-align: center;
    margin-top: 20px;
  }

  .brand { position: absolute; top: 48px; right: 60px; z-index: 10; }
  .brand svg { width: 40px; height: 40px; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="brand">
  <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="18,1.5 34.5,18 18,34.5 1.5,18" stroke="#C9A962" stroke-width="0.9" stroke-opacity="0.85"/>
    <polygon points="18,7 31,18 18,29 5,18" stroke="#C9A962" stroke-width="0.45" stroke-opacity="0.3"/>
    <path d="M12 24.5V11.5L24 24.5V11.5" stroke="#C9A962" stroke-width="1.6" stroke-linecap="square" stroke-linejoin="miter"/>
  </svg>
</div>
<div class="wrap">
  <div class="three-words">
    <div class="word">Anything.</div>
    <div class="dot-sep"></div>
    <div class="word gold">Anywhere.</div>
    <div class="dot-sep"></div>
    <div class="word">Anytime.</div>
  </div>

  <div class="services-grid">

    <!-- Exotic Car Rental -->
    <div class="service-card">
      <div class="card-photo" style="background-image: url('https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=600&q=85')"></div>
      <div class="card-overlay"></div>
      <div class="card-glow"></div>
      <div class="card-border"></div>
      <div class="card-content">
        <div class="card-name">Exotic Car Rental</div>
        <div class="card-sub">Ferrari · Lambo · Rolls</div>
      </div>
    </div>

    <!-- Private Jets -->
    <div class="service-card">
      <div class="card-photo" style="background-image: url('https://images.unsplash.com/photo-1540962351504-03099e0a754b?w=600&q=85')"></div>
      <div class="card-overlay"></div>
      <div class="card-glow"></div>
      <div class="card-border"></div>
      <div class="card-content">
        <div class="card-name">Private Jets</div>
        <div class="card-sub">Domestic · International</div>
      </div>
    </div>

    <!-- Superyachts -->
    <div class="service-card">
      <div class="card-photo" style="background-image: url('https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?w=600&q=85')"></div>
      <div class="card-overlay"></div>
      <div class="card-glow"></div>
      <div class="card-border"></div>
      <div class="card-content">
        <div class="card-name">Superyachts</div>
        <div class="card-sub">Mediterranean · Pacific</div>
      </div>
    </div>

    <!-- Luxury Villas -->
    <div class="service-card">
      <div class="card-photo" style="background-image: url('https://images.unsplash.com/photo-1613977257363-707ba9348227?w=600&q=85')"></div>
      <div class="card-overlay"></div>
      <div class="card-glow"></div>
      <div class="card-border"></div>
      <div class="card-content">
        <div class="card-name">Luxury Villas</div>
        <div class="card-sub">Staffed · Fully private</div>
      </div>
    </div>

    <!-- Chauffeur -->
    <div class="service-card">
      <div class="card-photo" style="background-image: url('https://images.unsplash.com/photo-1684208551877-6595c34bf759?w=600&q=85')"></div>
      <div class="card-overlay"></div>
      <div class="card-glow"></div>
      <div class="card-border"></div>
      <div class="card-content">
        <div class="card-name">Chauffeur Services</div>
        <div class="card-sub">24/7 · Discreet</div>
      </div>
    </div>

    <!-- Designer Bags -->
    <div class="service-card">
      <div class="card-photo" style="background-image: url('https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=600&q=85')"></div>
      <div class="card-overlay"></div>
      <div class="card-glow"></div>
      <div class="card-border"></div>
      <div class="card-content">
        <div class="card-name">Designer Bags</div>
        <div class="card-sub">Hermès · Chanel · LV</div>
      </div>
    </div>

  </div>

  <div class="tagline">usenexassist.com &nbsp;·&nbsp; Free to use &nbsp;·&nbsp; 24/7</div>
</div>
</body>
</html>
