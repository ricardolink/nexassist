<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 608px;
    background: #080d18;
    font-family: 'Georgia', serif;
    overflow: hidden;
    position: relative;
  }

  /* Background car photo */
  .photo-bg {
    position: absolute; inset: 0;
    background-image: url('./escalade-2025.png');
    background-size: cover; background-position: center 45%;
  }
  .photo-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      105deg,
      rgba(8,13,24,0.97) 0%,
      rgba(8,13,24,0.85) 35%,
      rgba(8,13,24,0.5) 65%,
      rgba(8,13,24,0.25) 100%
    );
  }

  /* Grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(201,169,98,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,169,98,0.035) 1px, transparent 1px);
    background-size: 70px 70px;
    mask-image: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 60%, transparent 100%);
  }

  /* Gold accent lines */
  .accent-top {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #C9A962, rgba(201,169,98,0.3) 60%, transparent);
  }
  .accent-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, rgba(201,169,98,0.5), rgba(201,169,98,0.1) 60%, transparent);
  }
  .accent-left {
    position: absolute; top: 0; bottom: 0; left: 0; width: 3px;
    background: linear-gradient(180deg, #C9A962, rgba(201,169,98,0.3) 60%, transparent);
  }

  /* Corner decorations */
  .corner-tl {
    position: absolute; top: 20px; left: 20px;
    width: 30px; height: 30px;
    border-top: 1px solid rgba(201,169,98,0.5);
    border-left: 1px solid rgba(201,169,98,0.5);
  }
  .corner-br {
    position: absolute; bottom: 20px; right: 20px;
    width: 30px; height: 30px;
    border-bottom: 1px solid rgba(201,169,98,0.25);
    border-right: 1px solid rgba(201,169,98,0.25);
  }

  /* Content */
  .content {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 72px;
  }

  .eyebrow {
    font-family: 'Arial', sans-serif;
    font-size: 11px; letter-spacing: 0.55em; text-transform: uppercase;
    color: rgba(201,169,98,0.7); margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::before {
    content: ''; display: block; width: 30px; height: 1px; background: rgba(201,169,98,0.5);
  }

  .logo-row {
    display: flex; align-items: center; gap: 20px; margin-bottom: 16px;
  }

  .brand-name {
    font-family: 'Georgia', serif;
    font-size: 64px; font-weight: bold;
    color: #fff; letter-spacing: 0.06em; line-height: 1;
  }
  .brand-name span { color: #C9A962; }

  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, #C9A962, transparent);
    margin: 18px 0;
  }

  .tagline {
    font-family: 'Arial', sans-serif;
    font-size: 15px; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 32px;
  }

  .services {
    display: flex; gap: 10px; flex-wrap: wrap; max-width: 520px;
  }
  .service-tag {
    font-family: 'Arial', sans-serif;
    font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(201,169,98,0.6);
    border: 1px solid rgba(201,169,98,0.2);
    padding: 6px 14px;
    background: rgba(8,13,24,0.5);
  }

  /* Right side — website */
  .right-content {
    position: absolute; right: 60px; bottom: 44px;
    text-align: right; z-index: 5;
  }
  .website {
    font-family: 'Arial', sans-serif;
    font-size: 13px; letter-spacing: 0.25em;
    color: rgba(201,169,98,0.5);
  }
  .available {
    font-family: 'Arial', sans-serif;
    font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
    color: rgba(255,255,255,0.2); margin-top: 4px;
  }

  /* Diamond logo small */
  .diamond-sm {
    position: absolute; right: 60px; top: 40px; z-index: 5;
  }
</style>
</head>
<body>
<div class="photo-bg"></div>
<div class="photo-overlay"></div>
<div class="grid"></div>
<div class="accent-top"></div>
<div class="accent-bottom"></div>
<div class="accent-left"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>

<div class="diamond-sm">
  <svg width="44" height="44" viewBox="0 0 36 36" fill="none">
    <polygon points="18,1.5 34.5,18 18,34.5 1.5,18" stroke="#C9A962" stroke-width="0.8" stroke-opacity="0.8"/>
    <polygon points="18,6 31,18 18,30 5,18" stroke="#C9A962" stroke-width="0.35" stroke-opacity="0.3"/>
    <path d="M12 24.5V11.5L24 24.5V11.5" stroke="#C9A962" stroke-width="1.5" stroke-linecap="square"/>
  </svg>
</div>

<div class="content">
  <div class="eyebrow">Los Angeles · Available 24/7</div>

  <div class="brand-name">Nex<span>Assist</span></div>

  <div class="divider"></div>

  <div class="tagline">Personal Luxury Concierge</div>

  <div class="services">
    <div class="service-tag">Exotic Car Rental</div>
    <div class="service-tag">Chauffeur Service</div>
    <div class="service-tag">Private Jets</div>
    <div class="service-tag">Yacht Charter</div>
    <div class="service-tag">Luxury Villas</div>
    <div class="service-tag">Car Sales</div>
    <div class="service-tag">Fine Watches</div>
    <div class="service-tag">Designer Bags</div>
    <div class="service-tag">Luxury Travel</div>
  </div>
</div>

<div class="right-content">
  <div class="website">usenexassist.com</div>
  <div class="available">Available 24 / 7</div>
</div>
</body>
</html>
