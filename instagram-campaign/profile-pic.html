<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 500px; height: 500px; overflow: hidden; background: #080d18; }
  .glow {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(ellipse, rgba(201,169,98,0.12) 0%, transparent 65%);
  }
  .wrap {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <svg width="240" height="240" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="18,1.5 34.5,18 18,34.5 1.5,18" stroke="#C9A962" stroke-width="0.9" stroke-opacity="0.95"/>
    <polygon points="18,7 31,18 18,29 5,18" stroke="#C9A962" stroke-width="0.45" stroke-opacity="0.4"/>
    <path d="M12 24.5V11.5L24 24.5V11.5" stroke="#C9A962" stroke-width="1.6" stroke-linecap="square" stroke-linejoin="miter"/>
  </svg>
</div>
</body>
</html>
