<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #080d18; font-family: 'Georgia', serif; }

  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(201,169,98,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,169,98,0.04) 1px, transparent 1px);
    background-size: 90px 90px;
  }

  .glow {
    position: absolute;
    width: 900px; height: 900px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(201,169,98,0.05) 0%, transparent 65%);
  }

  .wrap {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px;
  }

  .zero {
    font-size: 280px;
    font-weight: 900;
    font-family: 'Arial', sans-serif;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(201,169,98,0.2);
    line-height: 1;
    margin-bottom: -20px;
    letter-spacing: -0.04em;
    position: relative;
  }

  .zero-label {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    letter-spacing: 0.65em;
    text-transform: uppercase;
    color: #C9A962;
    margin-bottom: 48px;
  }

  .headline {
    font-size: 68px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 36px;
    letter-spacing: -0.01em;
  }

  .headline .gold { color: #C9A962; }

  .list {
    display: flex; flex-direction: column; gap: 16px; margin-bottom: 52px; width: 100%; max-width: 580px;
  }

  .list-item {
    display: flex; align-items: center; gap: 20px;
    font-family: 'Arial', sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.03em;
  }

  .check {
    width: 24px; height: 24px; flex-shrink: 0;
    border: 1px solid rgba(201,169,98,0.4);
    display: flex; align-items: center; justify-content: center;
    color: #C9A962;
    font-size: 14px;
    font-family: 'Arial', sans-serif;
  }

  .note {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-align: center;
    text-transform: uppercase;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 32px;
    width: 100%; max-width: 580px;
  }

  .brand {
    position: absolute;
    top: 52px; right: 64px; z-index: 3;
  }
  .brand svg { width: 40px; height: 40px; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>
<div class="brand">
  <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="18,1.5 34.5,18 18,34.5 1.5,18" stroke="#C9A962" stroke-width="0.9" stroke-opacity="0.85"/>
    <polygon points="18,7 31,18 18,29 5,18" stroke="#C9A962" stroke-width="0.45" stroke-opacity="0.3"/>
    <path d="M12 24.5V11.5L24 24.5V11.5" stroke="#C9A962" stroke-width="1.6" stroke-linecap="square" stroke-linejoin="miter"/>
  </svg>
</div>
<div class="wrap">
  <div class="zero">$0</div>
  <div class="zero-label">Membership fee</div>
  <div class="headline">Luxury access.<br><span class="gold">Completely free.</span></div>
  <div class="list">
    <div class="list-item"><div class="check">✓</div>No annual membership</div>
    <div class="list-item"><div class="check">✓</div>No sign-up fees</div>
    <div class="list-item"><div class="check">✓</div>No hidden charges</div>
    <div class="list-item"><div class="check">✓</div>No subscription required</div>
  </div>
  <div class="note">Traditional luxury concierges charge $10,000–$50,000/yr · We don't.</div>
</div>
</body>
</html>
