<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #04080f; font-family: 'Georgia', serif; }

  .bg-image {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #04080f 40%, #0d1824 100%);
  }

  .glow-left {
    position: absolute;
    width: 500px; height: 500px;
    top: -100px; left: -100px;
    background: radial-gradient(ellipse, rgba(201,169,98,0.06) 0%, transparent 70%);
  }

  .glow-right {
    position: absolute;
    width: 600px; height: 600px;
    bottom: -200px; right: -100px;
    background: radial-gradient(ellipse, rgba(14,40,80,0.8) 0%, transparent 70%);
  }

  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(201,169,98,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,169,98,0.04) 1px, transparent 1px);
    background-size: 90px 90px;
  }

  .wrap {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 96px;
  }

  .time-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 52px;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #C9A962;
    box-shadow: 0 0 12px rgba(201,169,98,0.8);
  }

  .time-text {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #C9A962;
  }

  .headline {
    font-size: 76px;
    font-weight: 700;
    color: #fff;
    line-height: 1.05;
    margin-bottom: 44px;
  }

  .headline em {
    font-style: normal;
    color: #C9A962;
  }

  .body {
    font-family: 'Arial', sans-serif;
    font-size: 20px;
    line-height: 1.75;
    color: rgba(255,255,255,0.45);
    max-width: 680px;
    margin-bottom: 56px;
    letter-spacing: 0.01em;
  }

  .cta {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: rgba(201,169,98,0.7);
    display: flex; align-items: center; gap: 16px;
  }

  .cta-line {
    width: 48px; height: 1px;
    background: rgba(201,169,98,0.4);
  }

  .big-number {
    position: absolute;
    bottom: 60px; right: 80px;
    font-size: 260px;
    font-weight: 900;
    color: rgba(201,169,98,0.04);
    line-height: 1;
    font-family: 'Arial', sans-serif;
    z-index: 1;
  }

  .brand {
    position: absolute;
    top: 52px; right: 64px;
    z-index: 3;
  }

  .brand svg { width: 44px; height: 44px; }
</style>
</head>
<body>
<div class="bg-image"></div>
<div class="grid"></div>
<div class="glow-left"></div>
<div class="glow-right"></div>
<div class="big-number">24</div>
<div class="brand">
  <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="18,1.5 34.5,18 18,34.5 1.5,18" stroke="#C9A962" stroke-width="0.9" stroke-opacity="0.85"/>
    <polygon points="18,7 31,18 18,29 5,18" stroke="#C9A962" stroke-width="0.45" stroke-opacity="0.3"/>
    <path d="M12 24.5V11.5L24 24.5V11.5" stroke="#C9A962" stroke-width="1.6" stroke-linecap="square" stroke-linejoin="miter"/>
  </svg>
</div>
<div class="wrap">
  <div class="time-badge">
    <div class="dot"></div>
    <div class="time-text">Available now · 3:17 AM</div>
  </div>
  <div class="headline">We don't<br>have <em>office hours.</em></div>
  <div class="body">It's 3AM and you need a Lamborghini for tomorrow morning. A yacht for the weekend. A private jet by noon. Send us a message — we'll have it handled before you wake up.</div>
  <div class="cta">
    <div class="cta-line"></div>
    NexAssist is available 24 hours, 7 days a week
  </div>
</div>
</body>
</html>
